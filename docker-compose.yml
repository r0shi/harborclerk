services:
  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - harbor-clerk

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LLAMA_SERVER_URL: http://llama-server:8080
      MODELS_DIR: /models
    volumes:
      - llama_models:/models
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/system/health'); r.raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - harbor-clerk

  worker-io:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: ["harbor-clerk-worker", "--queues", "io"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - harbor-clerk

  worker-cpu:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: ["harbor-clerk-worker", "--queues", "cpu"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - harbor-clerk

  embedder:
    build:
      context: .
      dockerfile: docker/embedder.Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - harbor-clerk

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harbor_clerk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harbor_clerk_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-harbor_clerk}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harbor_clerk}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - harbor-clerk

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - harbor-clerk

  tika:
    image: apache/tika:latest
    restart: unless-stopped
    networks:
      - harbor-clerk

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    volumes:
      - llama_models:/models
    command: [
      "--host", "0.0.0.0",
      "--port", "8080",
      "-ngl", "99",
      "-c", "8192",
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - harbor-clerk

volumes:
  pg_data:
  minio_data:
  caddy_data:
  caddy_config:
  llama_models:

networks:
  harbor-clerk:
    driver: bridge
