name: Security
on:
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: uv sync --extra test

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
          severity: HIGH

      - name: npm audit (high/critical)
        run: cd frontend && npm ci && npm audit --audit-level=high

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker build -f docker/app.Dockerfile -t harborclerk-app:ci .

      - name: Build embedder image
        run: docker build -f docker/embedder.Dockerfile -t harborclerk-embedder:ci .

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy scan app
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 harborclerk-app:ci

      - name: Trivy scan embedder
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 harborclerk-embedder:ci
