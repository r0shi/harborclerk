name: Security
on:
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python deps
        run: uv sync --extra test

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .
          severity: HIGH

      - name: npm audit (high/critical)
        run: cd frontend && npm ci && npm audit --audit-level=high

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker build -f docker/app.Dockerfile -t harborclerk-app:ci .

      - name: Build embedder image
        run: docker build -f docker/embedder.Dockerfile -t harborclerk-embedder:ci .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/master/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy scan app
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 harborclerk-app:ci

      - name: Trivy scan embedder
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 harborclerk-embedder:ci
